<header class="header">
  <div class="container">
    <div class="header-content">
      <div class="logo">
        <span class="brand-name">Eagle Heating & Cooling</span>
      </div>
      
      <nav id="primary-navigation" [class.active]="menuOpen" class="nav">
        <ul>
          <li><a (click)="navigateTo('')" class="nav-link">Home</a></li>
          <li><a (click)="navigateTo('services')" class="nav-link">Services</a></li>
          <li><a (click)="navigateTo('about')" class="nav-link">About</a></li>
          <li><a (click)="navigateTo('contact')" class="nav-link">Contact</a></li>
        </ul>
      </nav>

      <button
        class="menu-toggle"
        type="button"
        aria-label="Toggle navigation menu"
        [attr.aria-expanded]="menuOpen"
        aria-controls="primary-navigation"
        [class.active]="menuOpen"
        (click)="toggleMenu()"
      >
        <span aria-hidden="true"></span>
        <span aria-hidden="true"></span>
        <span aria-hidden="true"></span>
      </button>
    </div>
  </div>
</header>
